<!DOCTYPE html>
<html>
<head>
    <title>Add Page</title>
</head>
<body>
    <h1>Add a Page</h1>
    {% if category %}
        <form action="/rango/category/{{ category.slug }}/add_page/" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <input type="submit" name="submit" value="Add Page" />
        </form>
    {% else %}
        <p>The specified category does not exist.</p>
    {% endif %}
</body>
</html>
